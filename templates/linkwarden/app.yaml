name: linkwarden
description: Collaborative bookmark manager
category: productivity
version: "2.9.3"
ports:
  - host: 3200
    container: 3000
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "3200"
  - name: db_password
    description: PostgreSQL password
    secret: true
    auto_gen: password
  - name: nextauth_secret
    description: NextAuth secret key
    secret: true
    auto_gen: password
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: data
    container: /data/data
    description: Linkwarden data
  - name: db
    container: /var/lib/postgresql/data
    description: PostgreSQL data
health_check:
  url: "http://localhost:{{.web_port}}"
  interval: 60s
backup:
  paths:
    - data
    - db
  pre_hook: "docker exec linkwarden-db pg_dumpall -U linkwarden > /tmp/linkwarden-db-backup.sql"
  post_hook: "rm -f /tmp/linkwarden-db-backup.sql"
requirements:
  min_ram: 512M
  min_disk: 5G
  arch: [amd64, arm64]
