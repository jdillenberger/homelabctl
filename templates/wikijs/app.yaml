name: wikijs
description: Modern wiki and documentation platform
category: productivity
version: "2"
ports:
  - host: 3100
    container: 3000
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "3100"
  - name: db_password
    description: PostgreSQL password
    secret: true
    auto_gen: password
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: db
    container: /var/lib/postgresql/data
    description: PostgreSQL data
health_check:
  url: "http://localhost:{{.web_port}}/healthz"
  interval: 60s
backup:
  paths:
    - db
  pre_hook: "docker exec wikijs-db sh -c 'pg_dumpall -U wikijs' > /tmp/wikijs-db-backup.sql"
  post_hook: "rm -f /tmp/wikijs-db-backup.sql"
requirements:
  min_ram: 512M
  min_disk: 5G
  arch: [amd64, arm64]
