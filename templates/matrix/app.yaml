name: matrix
description: Matrix homeserver for decentralized messaging
category: social
version: "v1.148.0"
ports:
  - host: 8008
    container: 8008
    protocol: tcp
    description: Client-Server API
    value_name: web_port
values:
  - name: web_port
    description: Client-Server API port
    default: "8008"
  - name: server_name
    description: Matrix server name (domain)
    default: "matrix.local"
  - name: db_password
    description: PostgreSQL password
    secret: true
    auto_gen: password
  - name: registration_shared_secret
    description: Shared secret for user registration
    secret: true
    auto_gen: password
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: data
    container: /data
    description: Synapse data
  - name: db
    container: /var/lib/postgresql/data
    description: PostgreSQL data
health_check:
  url: "http://localhost:{{.web_port}}/_matrix/client/versions"
  interval: 30s
backup:
  paths:
    - data
    - db
  pre_hook: "docker exec matrix-db pg_dumpall -U synapse > /tmp/matrix-db-backup.sql"
  post_hook: "rm -f /tmp/matrix-db-backup.sql"
requirements:
  min_ram: 1G
  min_disk: 5G
  arch: [amd64, arm64]
