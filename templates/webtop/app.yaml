name: webtop
description: Full Linux desktop environment in the browser
category: desktop
version: "latest"
ports:
  - host: 3005
    container: 3000
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "3005"
  - name: distro
    description: Base distribution (ubuntu, alpine, fedora)
    default: "ubuntu"
  - name: desktop_env
    description: Desktop environment (xfce, kde, mate, i3, openbox)
    default: "xfce"
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: config
    container: /config
    description: Webtop configuration and home directory
health_check:
  url: "http://localhost:{{.web_port}}"
  interval: 30s
backup:
  paths:
    - config
requirements:
  min_ram: 2G
  arch: [amd64, arm64]
