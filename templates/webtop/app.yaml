name: webtop
description: Full Linux desktop environment in the browser
category: desktop
version: "latest"
ports:
  - host: 3000
    container: 3000
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "3000"
  - name: desktop_env
    description: Desktop environment (xfce, kde, mate, i3, openbox)
    default: "xfce"
volumes:
  - name: config
    container: /config
    description: Webtop configuration and home directory
health_check:
  url: "http://localhost:{{.web_port}}"
  interval: 30s
backup:
  paths:
    - config
requirements:
  min_ram: 1G
  arch: [amd64, arm64]
