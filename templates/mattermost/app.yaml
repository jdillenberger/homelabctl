name: mattermost
description: Open source team messaging platform
category: social
version: "latest"
ports:
  - host: 8065
    container: 8065
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "8065"
  - name: db_password
    description: PostgreSQL password
    secret: true
    auto_gen: password
dependencies:
  - docker
volumes:
  - name: config
    container: /mattermost/config
    description: Mattermost configuration
  - name: data
    container: /mattermost/data
    description: Mattermost data
  - name: logs
    container: /mattermost/logs
    description: Mattermost logs
  - name: plugins
    container: /mattermost/plugins
    description: Mattermost plugins
  - name: client-plugins
    container: /mattermost/client/plugins
    description: Mattermost client plugins
  - name: db
    container: /var/lib/postgresql/data
    description: PostgreSQL data
health_check:
  url: "http://localhost:{{.web_port}}"
  interval: 30s
backup:
  paths:
    - config
    - data
    - plugins
    - db
requirements:
  min_ram: 512M
  arch: [amd64, arm64]
