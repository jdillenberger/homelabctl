name: beszel
description: Lightweight server monitoring dashboard
category: infra
version: "0.18.4"
ports:
  - host: 8090
    container: 8090
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "8090"
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: data
    container: /beszel_data
    description: Beszel data
health_check:
  url: "http://localhost:{{.web_port}}"
  interval: 30s
backup:
  paths:
    - data
requirements:
  min_ram: 128M
  arch: [amd64, arm64]
