name: mealie
description: Self-hosted recipe manager and meal planner
category: lifestyle
version: "2.6.0"
ports:
  - host: 9925
    container: 9000
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "9925"
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: data
    container: /app/data
    description: Mealie data
health_check:
  url: "http://localhost:{{.web_port}}"
  interval: 30s
backup:
  paths:
    - data
requirements:
  min_ram: 256M
  arch: [amd64, arm64]
