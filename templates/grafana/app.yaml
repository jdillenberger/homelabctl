name: grafana
description: Monitoring stack with Grafana dashboards and Prometheus metrics
category: infra
version: "11.6.0"
ports:
  - host: 3000
    container: 3000
    protocol: tcp
    description: Grafana Web UI
    value_name: web_port
  - host: 9090
    container: 9090
    protocol: tcp
    description: Prometheus Web UI
    value_name: prometheus_port
values:
  - name: web_port
    description: Grafana Web UI port
    default: "3000"
  - name: admin_password
    description: Grafana admin password
    secret: true
    auto_gen: password
  - name: prometheus_port
    description: Prometheus Web UI port
    default: "9090"
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: grafana-data
    container: /var/lib/grafana
    description: Grafana data
  - name: prometheus-data
    container: /prometheus
    description: Prometheus data
health_check:
  url: "http://localhost:{{.web_port}}/api/health"
  interval: 30s
backup:
  paths:
    - grafana-data
    - prometheus-data
requirements:
  min_ram: 512M
  min_disk: 5G
  arch: [amd64, arm64]
