name: code-server
description: VS Code in the browser
category: dev
version: "4.109.5"
ports:
  - host: 8443
    container: 8443
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "8443"
  - name: password
    description: Login password
    secret: true
    auto_gen: password
  - name: sudo_password
    description: Sudo password
    secret: true
    auto_gen: password
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: config
    container: /config
    description: Code Server configuration and workspace
health_check:
  url: "http://localhost:{{.web_port}}"
  interval: 30s
backup:
  paths:
    - config
requirements:
  min_ram: 512M
  arch: [amd64, arm64]
