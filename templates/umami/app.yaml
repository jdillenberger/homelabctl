name: umami
description: Privacy-focused web analytics
category: analytics
version: "2.16"
ports:
  - host: 3800
    container: 3000
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "3800"
  - name: db_password
    description: PostgreSQL password
    secret: true
    auto_gen: password
  - name: app_secret
    description: Application secret
    secret: true
    auto_gen: password
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: db
    container: /var/lib/postgresql/data
    description: PostgreSQL data
health_check:
  url: "http://localhost:{{.web_port}}/api/heartbeat"
  interval: 30s
backup:
  paths:
    - db
  pre_hook: "docker exec umami-db pg_dumpall -U umami > /tmp/umami-db-backup.sql"
  post_hook: "rm -f /tmp/umami-db-backup.sql"
requirements:
  min_ram: 256M
  min_disk: 2G
  arch: [amd64, arm64]
