name: ntfy
description: Self-hosted push notification service
category: infra
version: "2.11.0"
ports:
  - host: 2586
    container: 80
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "2586"
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: cache
    container: /var/cache/ntfy
    description: Ntfy cache data
  - name: config
    container: /etc/ntfy
    description: Ntfy configuration
health_check:
  url: "http://localhost:{{.web_port}}"
  interval: 30s
backup:
  paths:
    - cache
    - config
requirements:
  min_ram: 64M
  arch: [amd64, arm64]
