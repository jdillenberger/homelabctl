name: wireguard
description: WireGuard VPN server with web UI via wg-easy
category: networking
version: "15"
ports:
  - host: 51820
    container: 51820
    protocol: udp
    description: VPN (UDP)
    value_name: vpn_port
  - host: 51821
    container: 51821
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "51821"
  - name: vpn_port
    description: VPN port
    default: "51820"
  - name: wg_host
    description: Server public IP or hostname for VPN clients
    required: true
  - name: password
    description: Web UI password
    secret: true
    auto_gen: password
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: config
    container: /etc/wireguard
    description: WireGuard configuration
health_check:
  url: "http://localhost:{{.web_port}}"
  interval: 30s
backup:
  paths:
    - config
requirements:
  min_ram: 128M
  arch: [amd64, arm64]
