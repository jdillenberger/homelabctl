name: crowdsec
description: Collaborative intrusion prevention system
category: security
version: "v1.6.4"
ports:
  - host: 8080
    container: 8080
    protocol: tcp
    description: API port
    value_name: api_port
values:
  - name: api_port
    description: CrowdSec API port
    default: "8080"
  - name: collections
    description: CrowdSec collections to install (space-separated)
    default: "crowdsecurity/linux"
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: config
    container: /etc/crowdsec
    description: CrowdSec configuration
  - name: data
    container: /var/lib/crowdsec/data
    description: CrowdSec data
health_check:
  url: "http://localhost:{{.api_port}}/v1/heartbeat"
  interval: 30s
backup:
  paths:
    - config
    - data
requirements:
  min_ram: 512M
  arch: [amd64, arm64]
