name: actual-budget
description: Privacy-focused personal budgeting app
category: finance
version: "25.3.1"
ports:
  - host: 5006
    container: 5006
    protocol: tcp
    description: Web UI
    value_name: web_port
values:
  - name: web_port
    description: Web UI port
    default: "5006"
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: data
    container: /data
    description: Actual Budget data
health_check:
  url: "http://localhost:{{.web_port}}"
  interval: 30s
backup:
  paths:
    - data
requirements:
  min_ram: 128M
  arch: [amd64, arm64]
