name: keycloak
description: Identity and access management / SSO server
category: infra
version: "26.5.4"
ports:
  - host: 8443
    container: 8443
    protocol: tcp
    description: HTTPS
    value_name: https_port
  - host: 8080
    container: 8080
    protocol: tcp
    description: HTTP
    value_name: http_port
values:
  - name: admin_user
    description: Keycloak admin username
    default: "admin"
  - name: admin_password
    description: Keycloak admin password
    secret: true
    auto_gen: password
  - name: db_password
    description: PostgreSQL password
    secret: true
    auto_gen: password
  - name: http_port
    description: HTTP port
    default: "8080"
  - name: https_port
    description: HTTPS port
    default: "8443"
  - name: timezone
    description: Timezone
    default: "UTC"
dependencies:
  - docker
volumes:
  - name: db
    container: /var/lib/postgresql/data
    description: PostgreSQL data
health_check:
  url: "http://localhost:{{.http_port}}/health/ready"
  interval: 30s
backup:
  paths:
    - db
  pre_hook: "docker exec keycloak-db pg_dumpall -U keycloak > /tmp/keycloak-db-backup.sql"
  post_hook: "rm -f /tmp/keycloak-db-backup.sql"
requirements:
  min_ram: 512M
  min_disk: 2G
  arch: [amd64, arm64]
