root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/homelabctl"
  cmd = "go build -o ./tmp/homelabctl ./cmd/homelabctl"
  delay = 1000
  exclude_dir = ["tmp", "bin", "vendor", "node_modules"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "html", "css", "js", "yaml", "tmpl"]
  kill_delay = 500
  send_interrupt = true
  stop_on_error = true

[build.args_bin]
  serve = ""

[log]
  time = false

[color]
  main = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
