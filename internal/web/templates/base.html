<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{block "title" .}}homelabctl{{end}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            if (!theme) {
                theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        :root {
            --nav-bg: #1a1a2e;
            --sidebar-width: 300px;
        }
        nav {
            background: var(--nav-bg);
            padding: 0.75rem 1.5rem;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        nav a {
            color: #e0e0e0;
            text-decoration: none;
        }
        nav a:hover, nav a.active {
            color: #fff;
        }
        .logo {
            font-weight: 600;
            font-size: 1rem;
            color: #ccc !important;
            letter-spacing: 0.02em;
        }
        .stats-toggle {
            background: none;
            border: 1px solid #555;
            color: #9e9e9e;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            line-height: 1.4;
            white-space: nowrap;
        }
        .stats-toggle:hover {
            border-color: #fff;
            color: #fff;
        }
        .stats-toggle-label {
            display: none;
        }

        /* Sidebar overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
        }
        .sidebar-overlay.open {
            display: block;
        }

        /* Sidebar panel */
        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: var(--sidebar-width);
            height: 100%;
            background: var(--pico-card-background-color, #fff);
            border-left: 1px solid var(--pico-muted-border-color, #e0e0e0);
            z-index: 101;
            transform: translateX(100%);
            transition: transform 0.25s ease;
            overflow-y: auto;
            padding: 1rem 1.25rem;
        }
        .sidebar.open {
            transform: translateX(0);
        }
        .sidebar h4 {
            margin: 0 0 0.75rem;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar-close {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--pico-muted-color, #666);
            padding: 0;
            line-height: 1;
        }
        .sidebar-section {
            margin-bottom: 1.5rem;
        }
        .sidebar-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--pico-muted-color, #666);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        /* Sidebar stats grid (compact, 2 columns) */
        .sidebar-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        .sidebar-stat {
            text-align: center;
            padding: 0.5rem;
            border-radius: 6px;
            background: var(--pico-background-color, #f8f9fa);
            border: 1px solid var(--pico-muted-border-color, #e0e0e0);
        }
        .sidebar-stat .value {
            font-size: 1.25rem;
            font-weight: bold;
        }
        .sidebar-stat .label {
            font-size: 0.7rem;
            color: var(--pico-muted-color, #666);
        }

        /* Main content stats grid (used on dashboard for mobile) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            text-align: center;
            padding: 1rem;
            border-radius: 8px;
            background: var(--pico-card-background-color, #fff);
            border: 1px solid var(--pico-muted-border-color, #e0e0e0);
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: bold;
        }
        .stat-card .label {
            font-size: 0.85rem;
            color: var(--pico-muted-color, #666);
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .app-card {
            padding: 1rem;
            border-radius: 8px;
            background: var(--pico-card-background-color, #fff);
            border: 1px solid var(--pico-muted-border-color, #e0e0e0);
        }
        .app-card h4 {
            margin-bottom: 0.5rem;
        }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .badge-running {
            background: #d4edda;
            color: #155724;
        }
        .badge-stopped {
            background: #f8d7da;
            color: #721c24;
        }
        .badge-available {
            background: #d1ecf1;
            color: #0c5460;
        }
        .badge-deployed {
            background: #d4edda;
            color: #155724;
        }
        .actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }
        .actions button, .actions a {
            font-size: 0.85rem;
            padding: 0.35rem 0.75rem;
        }
        footer {
            text-align: center;
            padding: 1rem;
            color: var(--pico-muted-color, #666);
            font-size: 0.85rem;
        }
        .quick-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .section-title {
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        .htmx-indicator {
            opacity: 0;
            transition: opacity 200ms ease-in;
        }
        .htmx-request .htmx-indicator {
            opacity: 1;
        }
        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.25rem 0.5rem;
            line-height: 1;
        }

        /* Alert banner */
        .alert-banner {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 0.6rem 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
        [data-theme="dark"] .alert-banner {
            background: #332701;
            color: #ffc107;
            border-color: #664d00;
        }

        /* Compact peers row */
        .peers-compact {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .peer-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.65rem;
            border-radius: 16px;
            font-size: 0.8rem;
            background: var(--pico-card-background-color, #fff);
            border: 1px solid var(--pico-muted-border-color, #e0e0e0);
            text-decoration: none;
            color: inherit;
        }
        .peer-chip:hover {
            border-color: var(--pico-primary, #1095c1);
        }
        .peer-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #28a745;
            display: inline-block;
        }

        /* Search input */
        .app-search {
            margin-bottom: 1rem;
        }
        .app-search input {
            margin-bottom: 0;
        }

        /* Responsive: on mobile show label, hide inline stats */
        @media (max-width: 768px) {
            .stats-toggle-stats {
                display: none;
            }
            .stats-toggle-label {
                display: inline;
            }
            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="/">Portal</a></li>
            <li><a href="/apps">Apps</a></li>
            <li><a href="/backups">Backups</a></li>
            <li><a href="/alerts">Alerts</a></li>
            <li><a href="/fleet">Fleet</a></li>
            <li><a href="/settings">Settings</a></li>
        </ul>
        <ul>
            <li><a href="/" class="logo">{{.Hostname}}.{{.Domain}}</a></li>
        </ul>
        <ul>
            <li>
                <button class="stats-toggle" onclick="toggleSidebar()" title="System stats">
                    <span class="stats-toggle-stats" hx-get="/stats/compact" hx-trigger="load, every 10s" hx-swap="innerHTML"></span>
                    <span class="stats-toggle-label">Stats</span>
                </button>
            </li>
            <li><button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode" id="theme-btn"></button></li>
        </ul>
    </nav>

    <!-- Stats sidebar -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar" id="stats-sidebar">
        <h4>
            System
            <button class="sidebar-close" onclick="toggleSidebar()">&times;</button>
        </h4>

        <div class="sidebar-section">
            <div class="sidebar-section-title">Resources</div>
            <div id="sidebar-stats" hx-get="/stats/partial" hx-trigger="load, every 10s" hx-swap="innerHTML">
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title">Recent Alerts</div>
            <div id="sidebar-alerts" hx-get="/alerts/partial" hx-trigger="load, every 30s" hx-swap="innerHTML">
            </div>
        </div>

        <div style="margin-top:1rem;">
            <a href="/alerts" style="font-size:0.85rem;">View all alerts &rarr;</a>
        </div>
    </aside>

    <main class="container">
        {{block "content" .}}{{end}}
    </main>

    <footer>
        <p>homelabctl &mdash; Deploy self-hosted apps in seconds</p>
    </footer>
    <script>
        function updateThemeBtn() {
            var btn = document.getElementById('theme-btn');
            btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
        }
        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeBtn();
        }
        updateThemeBtn();

        function toggleSidebar() {
            document.getElementById('stats-sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }
    </script>
</body>
</html>
