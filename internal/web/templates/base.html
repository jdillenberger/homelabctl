<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{block "title" .}}homelabctl{{end}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            if (!theme) {
                theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <style>
        /* ═══════════════════════════════════════
           Variables
           ═══════════════════════════════════════ */
        :root {
            --nav-bg: {{if .NavColor}}{{.NavColor}}{{else}}#02638b{{end}};
        }

        /* ═══════════════════════════════════════
           Navigation
           ═══════════════════════════════════════ */
        .nav-brand {
            background: var(--nav-bg);
            padding: 0.6rem 0;
        }
        .nav-brand > .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 0;
            padding-bottom: 0;
        }
        .nav-menu {
            background: color-mix(in srgb, var(--nav-bg) 85%, #000);
            padding: 0;
            border-bottom: 1px solid color-mix(in srgb, var(--nav-bg) 70%, #000);
        }
        .nav-menu > .container {
            display: flex;
            align-items: center;
            padding-top: 0;
            padding-bottom: 0;
        }
        .nav-menu ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
        }
        .nav-menu a {
            display: block;
            color: #b0c4ce;
            text-decoration: none;
            padding: 0.55rem 1rem;
            font-size: 0.85rem;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
        }
        .nav-menu a:hover {
            color: #fff;
            background: rgba(255,255,255,0.08);
        }
        .nav-menu a.active {
            color: #fff;
            background: rgba(255,255,255,0.12);
        }
        .logo {
            font-weight: 600;
            font-size: 1.05rem;
            color: #e0e0e0 !important;
            letter-spacing: 0.02em;
            text-decoration: none;
        }
        .logo:hover {
            color: #fff !important;
        }
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.4rem;
            flex-direction: column;
            gap: 4px;
            margin: 0;
        }
        .nav-toggle-bar {
            display: block;
            width: 20px;
            height: 2px;
            background: #ccc;
            border-radius: 1px;
        }
        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.25rem 0.5rem;
            line-height: 1;
            color: #b0c4ce;
        }
        .theme-toggle:hover {
            color: #fff;
        }

        /* ═══════════════════════════════════════
           Cards & Grids
           ═══════════════════════════════════════ */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .app-card {
            display: block;
            padding: 1.25rem;
            border-radius: 8px;
            background: var(--pico-card-background-color, #fff);
            border: 1px solid var(--pico-muted-border-color, #e0e0e0);
            border-left: 3px solid var(--pico-primary, #1095c1);
            color: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .app-card:hover {
            border-left-color: var(--pico-primary-hover, #08769b);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .app-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .app-card-name {
            font-weight: 700;
            font-size: 1.05rem;
            text-decoration: none;
            color: inherit;
        }
        .app-card-name:hover {
            color: var(--pico-primary, #1095c1);
        }
        .app-card-manage {
            margin-left: auto;
            font-size: 0.75rem;
            color: var(--pico-muted-color, #888);
            text-decoration: none;
        }
        .app-card-manage:hover {
            color: var(--pico-primary, #1095c1);
        }
        .app-card-desc {
            font-size: 0.85rem;
            color: var(--pico-muted-color, #666);
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }
        .app-card-meta {
            display: flex;
            gap: 0.75rem;
            font-size: 0.78rem;
            color: var(--pico-muted-color, #888);
        }
        .dashboard-extra {
            margin-top: 1.5rem;
        }
        .dashboard-extra:empty {
            display: none;
        }

        /* ═══════════════════════════════════════
           Badges
           ═══════════════════════════════════════ */
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .badge-running {
            background: #d4edda;
            color: #155724;
        }
        .badge-stopped {
            background: #f8d7da;
            color: #721c24;
        }
        .badge-available {
            background: #d1ecf1;
            color: #0c5460;
        }
        .badge-deployed {
            background: #d4edda;
            color: #155724;
        }
        [data-theme="dark"] .badge-running,
        [data-theme="dark"] .badge-deployed {
            background: #1b4332;
            color: #95d5b2;
        }
        [data-theme="dark"] .badge-stopped {
            background: #4a1420;
            color: #f4a9b8;
        }
        [data-theme="dark"] .badge-available {
            background: #0a3040;
            color: #8ecae6;
        }

        /* ═══════════════════════════════════════
           Alert Banner
           ═══════════════════════════════════════ */
        .alert-banner {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 0.6rem 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
        [data-theme="dark"] .alert-banner {
            background: #332701;
            color: #ffc107;
            border-color: #664d00;
        }

        /* ═══════════════════════════════════════
           Empty States
           ═══════════════════════════════════════ */
        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--pico-muted-color, #666);
        }
        .empty-state strong {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
            color: var(--pico-color, inherit);
        }

        /* ═══════════════════════════════════════
           Peers
           ═══════════════════════════════════════ */
        .peers-compact {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .peer-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.65rem;
            border-radius: 16px;
            font-size: 0.8rem;
            background: var(--pico-card-background-color, #fff);
            border: 1px solid var(--pico-muted-border-color, #e0e0e0);
            text-decoration: none;
            color: inherit;
        }
        .peer-chip:hover {
            border-color: var(--pico-primary, #1095c1);
        }
        .peer-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #28a745;
            display: inline-block;
        }

        /* ═══════════════════════════════════════
           Utilities
           ═══════════════════════════════════════ */
        .actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }
        .actions button, .actions a {
            font-size: 0.85rem;
            padding: 0.35rem 0.75rem;
        }
        .quick-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .section-title {
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        .app-search {
            margin-bottom: 1rem;
        }
        .app-search input {
            margin-bottom: 0;
        }
        code {
            cursor: pointer;
            position: relative;
        }
        code:hover {
            opacity: 0.8;
        }
        code.copied::after {
            content: 'Copied!';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--pico-color, #333);
            color: var(--pico-background-color, #fff);
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
        }
        .htmx-indicator {
            opacity: 0;
            transition: opacity 200ms ease-in;
        }
        .htmx-request .htmx-indicator {
            opacity: 1;
        }
        article > table td:first-child {
            white-space: nowrap;
            width: 1%;
        }
        article > table {
            margin-bottom: 0;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main.container {
            flex: 1;
        }
        footer {
            background: var(--pico-card-background-color, #f8f9fa);
            border-top: 1px solid var(--pico-muted-border-color, #e0e0e0);
            margin-top: auto;
            padding: 0;
        }
        footer > .container {
            display: flex;
            align-items: center;
            height: 30px;
            font-size: 0.75rem;
            color: #9e9e9e;
            gap: 1rem;
            padding-top: 0;
            padding-bottom: 0;
        }
        .footer-stats {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }
        .footer-stat {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .footer-stat-label {
            font-weight: 600;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            color: #888;
        }
        .footer-stat-bar {
            width: 48px;
            height: 5px;
            background: var(--pico-muted-border-color, #ddd);
            border-radius: 3px;
            overflow: hidden;
            display: inline-block;
        }
        .footer-stat-fill {
            display: block;
            height: 100%;
            background: var(--pico-primary, #1095c1);
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .footer-stat-value {
            font-variant-numeric: tabular-nums;
            min-width: 2.2em;
            color: var(--pico-muted-color, #666);
        }
        .footer-sep {
            width: 1px;
            height: 14px;
            background: var(--pico-muted-border-color, #ddd);
            flex-shrink: 0;
        }
        .footer-info {
            color: var(--pico-muted-color, #888);
            white-space: nowrap;
        }
        .footer-brand {
            color: var(--pico-muted-color, #aaa);
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ═══════════════════════════════════════
           Log Viewer
           ═══════════════════════════════════════ */
        .log-container {
            background: #1e1e1e;
            border-radius: 6px;
            border: 1px solid #333;
            padding: 1rem;
            height: 70vh;
            overflow-y: auto;
        }
        .log-container pre {
            margin: 0;
            color: #d4d4d4;
            font-size: 0.8rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', Courier, monospace;
        }

        /* ═══════════════════════════════════════
           Responsive
           ═══════════════════════════════════════ */
        @media (max-width: 768px) {
            .nav-toggle {
                display: flex;
            }
            .nav-menu ul {
                display: none !important;
                flex-direction: column;
                width: 100%;
            }
            .nav-menu ul.open {
                display: flex !important;
            }
            .nav-menu a {
                padding: 0.6rem 1rem;
            }
            footer {
                font-size: 0.65rem;
                padding: 0 0.5rem;
                gap: 0.5rem;
            }
            .footer-stat-bar {
                width: 32px;
            }
            .footer-stats {
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="nav-brand">
        <div class="container">
            <a href="/" class="logo">{{.Hostname}}.{{.Domain}}</a>
            <div>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode" id="theme-btn"></button>
                <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">
                    <span class="nav-toggle-bar"></span>
                    <span class="nav-toggle-bar"></span>
                    <span class="nav-toggle-bar"></span>
                </button>
            </div>
        </div>
    </div>
    <nav class="nav-menu">
        <div class="container">
            <ul>
                <li><a href="/">Portal</a></li>
                <li><a href="/apps">Apps</a></li>
                <li><a href="/backups">Backups</a></li>
                <li><a href="/alerts">Alerts</a></li>
                <li><a href="/fleet">Fleet</a></li>
                <li><a href="/settings">Settings</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {{block "content" .}}{{end}}
    </main>

    <footer>
        <div class="container">
            <div class="footer-stats" hx-get="/stats/dashboard" hx-trigger="load, every 10s" hx-swap="innerHTML"></div>
            <div class="footer-sep"></div>
            <div class="footer-info">{{.Hostname}}.{{.Domain}}</div>
            <div class="footer-sep"></div>
            <div class="footer-info" hx-get="/stats/compact" hx-trigger="load, every 10s" hx-swap="innerHTML"></div>
            <div style="flex:1;"></div>
            <div class="footer-brand">homelabctl</div>
        </div>
    </footer>
    <script>
        function updateThemeBtn() {
            var btn = document.getElementById('theme-btn');
            btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
        }
        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeBtn();
        }
        updateThemeBtn();

        function toggleNav() {
            document.querySelector('.nav-menu ul').classList.toggle('open');
        }

        // Click-to-copy for code elements
        function copyText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text);
            } else {
                var ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            }
        }
        document.addEventListener('click', function(e) {
            var code = e.target.closest('code');
            if (!code) return;
            copyText(code.textContent.trim());
            code.classList.add('copied');
            setTimeout(function() { code.classList.remove('copied'); }, 1200);
        });

        // Active nav link
        (function() {
            var path = window.location.pathname;
            document.querySelectorAll('.nav-menu a').forEach(function(a) {
                var href = a.getAttribute('href');
                if (href === '/' ? path === '/' : path.startsWith(href)) {
                    a.classList.add('active');
                }
            });
        })();
    </script>
</body>
</html>
